name: taramx

services:
  certbot:
    image: certbot/certbot:v5.5.0
    depends_on:
      unbound:
        condition: service_healthy
    volumes:
      - ./certbot/deploy-hook.sh:/deploy-hook.sh:ro
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/html
    environment:
      - MX_HOSTNAME=${MX_HOSTNAME}
    networks:
      default:
        aliases:
          - taramx-certbot
    command: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot --webroot-path=/var/www/html --deploy-hook /deploy-hook.sh;
        sleep 12h;
      done"
    entrypoint: ""
    restart: always
    healthcheck:
      test: ["CMD", "test", "-e", "/etc/letsencrypt/live/fullchain.pem"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 15

  postfix:
    build: postfix
    depends_on:
      certbot:
        condition: service_healthy
      unbound:
        condition: service_healthy
    volumes:
      - ./postfix/conf:/opt/postfix/conf:z
      - certbot-certs:/etc/letsencrypt:ro,z
      - postfix-vol-1:/var/spool/postfix
    environment:
      - MX_HOSTNAME=${MX_HOSTNAME}
      - RELAY_DOMAINS=${RELAY_DOMAINS}
      - RELAY_HOST=${RELAY_HOST}
      - SUBMISSION_USER=${SUBMISSION_USER:-}
      - SUBMISSION_PASS=${SUBMISSION_PASS:-}
    ports:
      - '${SMTP_PORT:-25}:25'
      - '${SUBMISSION_PORT:-587}:587'
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.2}.253
        aliases:
          - taramx-postfix
    restart: always
    cap_add:
      - NET_BIND_SERVICE
    dns:
      - ${IPV4_NETWORK:-172.22.2}.254

  unbound:
    build: unbound
    volumes:
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:ro,Z
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.2}.254
        aliases:
          - taramx-unbound
    restart: always

networks:
  default:
    driver: bridge
    enable_ipv6: true
    driver_opts:
      com.docker.network.bridge.name: br-taramx
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.2}.0/24
        - subnet: ${IPV6_NETWORK:-fd00:taramx::}/64

volumes:
  certbot-certs:
  certbot-www:
  postfix-vol-1:
